name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

# OIDC only. No long-lived AWS keys anywhere. (ADR-007)
permissions:
  id-token: write
  contents: read

env:
  # Nothing environment-specific is committed. (ADR-006)
  # Set these as GitHub repo variables/secrets — a forker sets their own.
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: "1.10.5"
  NODE_VERSION: "20"

jobs:
  # ADR-006. A leaked account ID, ARN, or endpoint fails the build.
  # This repo is public and must stay forkable.
  leak-check:
    name: No environment values in the repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Scan tracked files
        run: bash scripts/leak-check.sh

  verify:
    name: Lint, typecheck, test, build
    needs: leak-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npx biome ci .
      - run: npx tsc --noEmit
      - run: npm run test -- --run

      # ADR-009 proof #4: the generated schema accepts the content seed (Python side).
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Python schema proof
        working-directory: services/api
        run: |
          pip install fastjsonschema
          python test_schema.py

      - run: npm run build

      # Upload the clean production build BEFORE E2E runs — e2e:serve rebuilds dist
      # with example config/content seeded in, which must not become the deploy artifact.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1

      - name: E2E
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

  plan:
    name: Terraform plan
    needs: verify
    # Same-repo, non-Dependabot PRs only. Fork and Dependabot PRs run without
    # secrets by design, so this privileged job would just red-X at auth — and an
    # action-bump PR doesn't change Terraform anyway; `verify` still covers it.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Terraform inputs (ADR-006): env-specific values live only in GitHub
    # secrets/vars + Actions context, injected as TF_VAR_* — never committed.
    env:
      TF_VAR_region: ${{ vars.AWS_REGION }}
      TF_VAR_tf_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_contact_sender_email: ${{ secrets.CONTACT_SENDER_EMAIL }}
      TF_VAR_contact_recipient_email: ${{ secrets.CONTACT_RECIPIENT_EMAIL }}
      # Empty when unset, so a forker deploys CloudFront-URL-only until they set it.
      TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Public repo, public logs: redact the account ID everywhere downstream, so
      # ARNs and bucket names (e.g. kyleos-site-<id>) print as kyleos-site-***.
      - name: Mask AWS account ID in logs
        run: echo "::add-mask::$(aws sts get-caller-identity --query Account --output text)"

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      # archive_file is read at plan time, so build the package before init/plan.
      - run: bash scripts/package-lambdas.sh

      # State backend config is passed in, never committed. (ADR-006)
      - name: Plan
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=kyleos/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform plan -no-color

  deploy:
    name: Apply, configure, sync, invalidate
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: production
      cancel-in-progress: false
    # Terraform inputs (ADR-006): env-specific values live only in GitHub
    # secrets/vars + Actions context, injected as TF_VAR_* — never committed.
    env:
      TF_VAR_region: ${{ vars.AWS_REGION }}
      TF_VAR_tf_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
      TF_VAR_github_repo: ${{ github.repository }}
      TF_VAR_contact_sender_email: ${{ secrets.CONTACT_SENDER_EMAIL }}
      TF_VAR_contact_recipient_email: ${{ secrets.CONTACT_RECIPIENT_EMAIL }}
      # Empty when unset, so a forker deploys CloudFront-URL-only until they set it.
      TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Public repo, public logs: redact the account ID everywhere downstream, so
      # ARNs and bucket names (e.g. kyleos-site-<id>) print as kyleos-site-***.
      - name: Mask AWS account ID in logs
        run: echo "::add-mask::$(aws sts get-caller-identity --query Account --output text)"

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      # archive_file is read at apply time, so build the package before init/apply.
      - run: bash scripts/package-lambdas.sh

      - name: Terraform apply
        id: tf
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=kyleos/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
          terraform apply -auto-approve
          bucket=$(terraform output -raw site_bucket)
          distribution=$(terraform output -raw cloudfront_id)
          # Distribution IDs aren't account-derived, so the account-ID mask misses them;
          # mask it so it stays out of the invalidation command lines in the log.
          echo "::add-mask::$distribution"
          {
            echo "bucket=$bucket"
            echo "distribution=$distribution"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: dist

      # The app fetches this at boot. Generated from Terraform outputs, never
      # committed, never baked into the bundle. (ADR-006)
      - name: Generate config.json
        working-directory: infra
        run: terraform output -json runtime_config > ../dist/config.json

      # Hashed assets cache forever. index.html, config.json, content.json never do.
      - name: Sync hashed assets
        run: |
          aws s3 sync dist "s3://${{ steps.tf.outputs.bucket }}" \
            --exclude "index.html" \
            --exclude "config.json" \
            --exclude "content.json" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync index.html and config.json
        run: |
          aws s3 cp dist/index.html "s3://${{ steps.tf.outputs.bucket }}/index.html" \
            --cache-control "no-cache"
          aws s3 cp dist/config.json "s3://${{ steps.tf.outputs.bucket }}/config.json" \
            --cache-control "no-cache"

      # content.json is owned by the admin editor, not the deploy. Never touch it.
      # (ADR-002 — it is data, not code.)

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution }}" \
            --paths "/" "/index.html" "/config.json"
