# The workflow pins every action to a commit SHA (supply-chain hardening for a
# public repo with a privileged deploy role). Pins don't move on their own, so
# Dependabot watches for new releases and opens PRs that bump the SHA and its
# version comment together — keeping us current without trusting mutable tags.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
